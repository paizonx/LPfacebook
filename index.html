<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exclusive Viral Video Report</title>

<meta name="description" content="Watch the latest trending exclusive report now.">

<!-- FACEBOOK OPEN GRAPH -->
<meta property="og:title" content="Breaking Viral Video Report">
<meta property="og:description" content="Exclusive footage now available.">
<meta property="og:type" content="article">
<meta property="og:image" id="ogImage" content="">
<meta property="og:url" id="ogUrl" content="">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

<style>

body{
    background:#0b0b0b;
    color:white;
    font-family:'Inter',sans-serif;
}

.player{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    overflow:hidden;
    border-radius:14px;
    background:#111;
    border:1px solid #222;
}

.player img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.4s;
}

.player:hover img{
    transform:scale(1.03);
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,.7), rgba(0,0,0,.2));
}

.playBtn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
    height:90px;
    background:#e50914;
    border-radius:999px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:35px;
    color:white;
    box-shadow:0 0 35px rgba(229,9,20,.6);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        transform:translate(-50%,-50%) scale(.95);
    }
    70%{
        transform:translate(-50%,-50%) scale(1);
    }
    100%{
        transform:translate(-50%,-50%) scale(.95);
    }
}

.watchBtn{
    background:#e50914;
    transition:.3s;
}

.watchBtn:hover{
    background:#c40812;
}

</style>
</head>

<body>

<div class="max-w-4xl mx-auto px-4 py-8">

    <div class="mb-8">
        <span class="bg-red-600 text-xs px-3 py-1 rounded font-bold uppercase">
            Breaking Report
        </span>

        <h1 class="text-4xl md:text-6xl font-black leading-tight mt-4">
            EXCLUSIVE VIRAL VIDEO FOOTAGE
        </h1>

        <p class="text-gray-400 mt-4">
            Verified media report now trending online.
        </p>
    </div>

    <!-- PLAYER -->
    <a id="videoLink" href="#" target="_blank" rel="nofollow noopener">

        <div class="player">

            <img id="thumbnail" src="" alt="thumbnail">

            <div class="overlay"></div>

            <div class="playBtn">
                <i class="fa-solid fa-play"></i>
            </div>

        </div>

    </a>

    <!-- BUTTON -->
    <div class="mt-8">

        <a
            id="watchBtn"
            href="#"
            target="_blank"
            rel="nofollow noopener"
            class="watchBtn block w-full text-center py-5 rounded-xl text-2xl font-black"
        >
            WATCH FULL VIDEO
        </a>

    </div>

</div>

<script>

/*
========================================
GET VIDEO ID
========================================
*/

function getVideoID(){

    // URL PARAM
    const params = new URLSearchParams(window.location.search);

    if(params.get('id')){
        return params.get('id');
    }

    // PATHNAME
    const path = window.location.pathname
        .split('/')
        .filter(Boolean);

    // LAST PATH
    if(path.length > 0){
        return path[path.length - 1];
    }

    // DEFAULT
    return 'LIWPZnsS1';
}

const videoId = getVideoID();

/*
========================================
BLOGSPOT TARGET
========================================
*/

const targetUrl =
`https://teuayadaya.blogspot.com/2026/05/${videoId}.html`;

/*
========================================
THUMBNAIL
========================================
*/

/*
GANTI DENGAN CDN THUMB YANG VALID
*/

const thumbnailSources = [

    `https://cdn.videy.co/${videoId}.jpg`,
    `https://cdn.videy.co/${videoId}.webp`,

    // fallback
    `https://placehold.co/1280x720/111111/ffffff?text=WATCH+VIDEO`

];

const thumbnail = document.getElementById('thumbnail');

let currentThumb = 0;

function loadThumbnail(index){

    if(index >= thumbnailSources.length){
        return;
    }

    const img = new Image();

    img.src = thumbnailSources[index];

    img.onload = function(){
        thumbnail.src = thumbnailSources[index];
    };

    img.onerror = function(){
        loadThumbnail(index + 1);
    };
}

loadThumbnail(currentThumb);

/*
========================================
SET LINKS
========================================
*/

document.getElementById('videoLink').href = targetUrl;
document.getElementById('watchBtn').href = targetUrl;

/*
========================================
DYNAMIC OG TAGS
========================================
*/

document.getElementById('ogUrl')
    .setAttribute('content', window.location.href);

document.getElementById('ogImage')
    .setAttribute(
        'content',
        thumbnailSources[0]
    );

/*
========================================
DEBUG
========================================
*/

console.log("VIDEO ID:", videoId);
console.log("TARGET:", targetUrl);

</script>

</body>
</html>
